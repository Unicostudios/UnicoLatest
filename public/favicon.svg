            <image width="500" height="500" xlink:href="data:image/png;base64,"></image>
          </svg></g>
      </g>
      <defs>
        <clipPath id="SvgjsClipPath1624">
          <rect width="1000" height="1000" x="0" y="0" rx="500" ry="500"></rect>
        </clipPath>
      </defs>
    </svg></g>
  <g id="dark-icon"><svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:svgjs="http://svgjs.dev/svgjs" width="1000" height="1000">
      <g clip-path="url(#SvgjsClipPath1625)">
        <rect width="1000" height="1000" fill="#ffffff"></rect>
        <g transform="matrix(2,0,0,2,0,0)"><svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" xmlns:svgjs="http://svgjs.dev/svgjs" width="500" height="500" viewBox="0 0 500 500">
            <image width="500" height="500" xlink:href="data:image/png;base64,"></image>
          </svg></g>
      </g>
      <defs>
        <clipPath id="SvgjsClipPath1625">
          <rect width="1000" height="1000" x="0" y="0" rx="500" ry="500"></rect>
